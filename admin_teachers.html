{% extends "base.html" %}

{% block content %}

<h2>Admin Panel – Manage Teachers</h2>

<hr>

<h3>Add New Teacher</h3>

<form method="post" action="{{ url_for('admin_add_teacher') }}">
    <input type="text" name="name" placeholder="Teacher Name" required>
    <input type="email" name="email" placeholder="Teacher Email" required>
    <input type="password" name="password" placeholder="Password" required>

    <button type="submit">Add Teacher</button>
</form>

<hr>

<h3>Existing Teachers</h3>

<table>
    <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Action</th>
    </tr>

    {% for t in teachers %}
    <tr>
        <td>{{ t.name }}</td>
        <td>{{ t.email }}</td>
        <td>
            <a href="{{ url_for('admin_delete_teacher', id=t.id) }}"
               onclick="return confirm('Delete this teacher?')">
               Delete
            </a>
        </td>
    </tr>
    {% endfor %}
</table>

<hr>

<a href="{{ url_for('admin_dashboard') }}">⬅ Back to Admin Dashboard</a>

{% endblock %}
